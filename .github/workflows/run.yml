name: Google Sheets Automation

on:
  schedule:
    # Har 40 minute mein run hoga
    - cron: "*/40 * * * *"
  workflow_dispatch: # Taaki aap jab chahein button daba kar chala sakein

jobs:
  run-script:
    runs-on: ubuntu-latest
    # Bahut zaroori: 100+ sheets ke liye script 20-30 min le sakti hai
    timeout-minutes: 60 

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install libraries
        # Ensure kijiye requirements.txt mein gspread, google-auth, aur pandas ho
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth google-api-python-client pandas

      - name: Run Script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        # Agar aapki file ka naam 'script.py' hai toh ye line sahi hai
        run: python script.py
